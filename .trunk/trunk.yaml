# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - grype@0.112.0
    - oxipng@10.1.1
    - eslint@10.4.0
    - osv-scanner@2.3.8
    - actionlint@1.7.12
    - taplo@0.10.0
    - checkov@3.2.529
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.3
    - trufflehog@3.95.3
    - yamllint@1.38.0
  ignore:
    - linters:
        - prettier
      paths:
        - .vscode/*.json
    - linters:
        - eslint
      paths:
        - worker-configuration.d.ts
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
    - bun-install
  definitions:
    - id: bun-install
      display_name: Install dependencies with bun, trigger postinstall
      description: Run bun install to ensure dependencies are up to date and postinstall runs
      run: bun install
      triggers:
        - git_hooks:
            - pre-commit
